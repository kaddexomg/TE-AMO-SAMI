<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Universo Contigo · Edición Estelar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background-color: #020205;  
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #fff;
        }
        #webgl-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        /* Pantalla de inicio con gradiente más suave */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 30% 40%, #251d2e, #020205 80%);
            z-index: 50;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1.5s ease;
        }
        #start-screen h1 { 
            font-size: clamp(2.5rem, 10vw, 5rem); 
            margin-bottom: 30px; 
            letter-spacing: 12px;
            text-transform: uppercase;
            font-weight: 200;
            text-align: center;
            background: linear-gradient(135deg, #ffffff, #c9b6e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(255,255,255,0.3);
        }
        
        .btn {
            background: transparent; 
            border: 1.5px solid rgba(255, 240, 250, 0.6);
            color: white; 
            padding: 16px 48px; 
            font-size: 1.1rem; 
            border-radius: 40px;
            cursor: pointer; 
            transition: all 0.4s ease;
            letter-spacing: 4px; 
            text-transform: uppercase;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(255,255,240,0.2);
        }
        .btn:hover { 
            background: rgba(255, 255, 255, 0.9); 
            color: #1a0b1a; 
            box-shadow: 0 0 40px #f0e6ff;
            border-color: white;
        }

        /* Modal glassmorphism refinado */
        #content-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.95);
            width: 90%; max-width: 620px;
            background: rgba(8, 5, 15, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 200, 230, 0.2);
            border-radius: 24px;
            padding: 30px 30px 35px;
            z-index: 20;
            opacity: 0; pointer-events: none;
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.3, 1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.05) inset;
        }
        #content-modal.active { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
        
        #modal-title { 
            font-size: 2.2rem; 
            margin-bottom: 15px; 
            font-weight: 300; 
            letter-spacing: 1.5px; 
            border-bottom: 1px solid rgba(255,255,255,0.15); 
            padding-bottom: 15px; 
            color: #ffe2f0;
            text-shadow: 0 0 15px magenta;
            font-family: 'Georgia', serif;
        }
        
        .carousel-container { 
            position: relative; 
            width: 100%; 
            height: 280px; 
            overflow: hidden; 
            margin-bottom: 20px; 
            border-radius: 20px; 
            background: #000; 
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
        }
        #carousel-image { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: opacity 0.6s ease; 
            border-radius: 20px;
        }
        
        #modal-text { 
            font-size: 1.1rem; 
            line-height: 1.7; 
            color: #f0e0f0; 
            font-weight: 300; 
            margin-bottom: 30px; 
            padding: 0 10px;
            font-style: italic;
            text-align: center;
        }

        .controls { 
            display: flex; 
            justify-content: space-between; 
            gap: 12px; 
            flex-wrap: wrap;
        }
        .nav-btn, .close-btn {
            background: rgba(20, 10, 25, 0.7); 
            border: 1px solid rgba(255, 180, 210, 0.3);
            color: white; 
            padding: 12px 25px; 
            font-size: 0.9rem; 
            cursor: pointer; 
            transition: all 0.3s;
            text-transform: uppercase; 
            letter-spacing: 2px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
            flex: 1;
            min-width: 110px;
        }
        .nav-btn:hover { 
            border-color: #ffb3d9; 
            background: rgba(120, 40, 80, 0.5); 
            box-shadow: 0 0 20px #ff99cc;
        }
        .close-btn { 
            border-color: rgba(255, 140, 140, 0.5); 
            color: #ffc0cb; 
        }
        .close-btn:hover { 
            background: rgba(180, 40, 60, 0.3); 
            border-color: #ff7373; 
            box-shadow: 0 0 20px #ff6666;
        }

        #instructions {
            position: absolute; bottom: 30px; left: 0; width: 100%;
            text-align: center; color: rgba(255, 255, 255, 0.4); font-size: 0.8rem; z-index: 10;
            letter-spacing: 3px; text-transform: uppercase; pointer-events: none;
            text-shadow: 0 0 10px black;
        }

        #error-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; display: none; z-index: 100; padding: 30px;
            background: rgba(30,10,20,0.9); border: 1px solid #ff4d6d; border-radius: 30px;
            color: white;
        }

        @media (max-width: 600px) {
            #content-modal { padding: 20px; }
            .carousel-container { height: 180px; }
            .controls { gap: 8px; }
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <audio id="bg-audio" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <div id="start-screen">
        <h1>Odisea de Amor</h1>
        <button class="btn" id="start-btn">Iniciar Exploración</button>
    </div>

    <div id="instructions">🪐 Toca un planeta · Lee los mensajes · Desliza con el mouse 🪐</div>
    <div id="error-message">⚠️ WebGL no está disponible. Intenta con otro navegador.</div>

    <div id="webgl-container"></div>

    <div id="content-modal">
        <h2 id="modal-title">Cuerpo Celeste</h2>
        <div class="carousel-container">
            <img id="carousel-image" src="" alt="Recuerdo estelar">
        </div>
        <p id="modal-text">Mensaje cargando...</p>
        
        <div class="controls">
            <button class="nav-btn" id="prev-btn">← Anterior</button>
            <button class="close-btn" id="close-btn">✕ Cerrar</button>
            <button class="nav-btn" id="next-btn">Siguiente →</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        /* ----------------------------------------------------------------
           CONFIGURACIÓN DEL SISTEMA SOLAR CON TEXTURAS MEJORADAS
           ---------------------------------------------------------------- */
        const solarSystem = [
            {
                id: 'sun',
                name: "Mi Sol",
                color: 0xffaa33,
                emissive: 0xff5500,
                radius: 5.5,
                distance: 0,
                speed: 0,
                texture: 'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg', // Reemplazar con textura solar real
                // Usaremos textura de sol más adelante (por ahora una genérica, pero se puede cambiar)
                slides: [
                    { image: "https://images.unsplash.com/photo-1541447271487-09612b3f49f7?auto=format&fit=crop&w=800", text: "Eres el centro de mi universo. Todo lo que soy gira alrededor de tu luz." },
                    { image: "https://images.unsplash.com/photo-1541447271487-09612b3f49f7?auto=format&fit=crop&w=800", text: "Tu calor me da vida en la inmensidad del cosmos." }
                ]
            },
            {
                id: 'mercury',
                name: "Mercurio · Primer Latido",
                color: 0xaaaaaa,
                radius: 0.9,
                distance: 11,
                speed: 0.02,
                texture: 'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg', // Placeholder, idealmente textura de Mercurio
                slides: [
                    { image: "https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?auto=format&fit=crop&w=800", text: "Tan cerca de ti que me quemo de ganas. Eres mi primer pensamiento." }
                ]
            },
            {
                id: 'venus',
                name: "Venus · Brillo Eterno",
                color: 0xe6b856,
                radius: 1.2,
                distance: 16,
                speed: 0.015,
                texture: 'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg',
                slides: [
                    { image: "https://images.unsplash.com/photo-1614313913007-2b4ae8ce32d6?auto=format&fit=crop&w=800", text: "Brillas más que cualquier lucero en la noche." }
                ]
            },
            {
                id: 'earth',
                name: "Nuestro Mundo",
                color: 0x2288ff,
                radius: 1.3,
                distance: 22,
                speed: 0.012,
                texture: 'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg',
                slides: [
                    { image: "https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?auto=format&fit=crop&w=800", text: "Tú eres mi hogar, mi lugar seguro en el universo." }
                ]
            },
            {
                id: 'mars',
                name: "Marte · Pasión Ardiente",
                color: 0xd84c3c,
                radius: 1.1,
                distance: 29,
                speed: 0.01,
                texture: 'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg',
                slides: [
                    { image: "https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?auto=format&fit=crop&w=800", text: "Cruzaría desiertos enteros solo para estar a tu lado." }
                ]
            },
            {
                id: 'jupiter',
                name: "Júpiter · Gigante de Amor",
                color: 0xd8a27a,
                radius: 3.2,
                distance: 44,
                speed: 0.007,
                texture: 'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg',
                slides: [
                    { image: "https://images.unsplash.com/photo-1630839437035-dac17da580d0?auto=format&fit=crop&w=800", text: "Mi amor por ti es tan inmenso como el planeta más grande." }
                ]
            },
            {
                id: 'saturn',
                name: "Saturno · Joya Anillada",
                color: 0xc0a06e,
                radius: 2.7,
                distance: 62,
                speed: 0.005,
                hasRings: true,
                texture: 'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg',
                slides: [
                    { image: "https://images.unsplash.com/photo-1614732414444-096e5f1122d5?auto=format&fit=crop&w=800", text: "Eres mi joya más preciada, rodeada de belleza sin fin." }
                ]
            }
        ];

        // ---------------------------------------------------------------
        // INICIALIZACIÓN MEJORADA CON SOPORTE WEBGL
        // ---------------------------------------------------------------
        let scene, camera, renderer, controls, raycaster, mouse;
        let planets = [];
        let interactables = [];
        let isTransitioning = false;
        let activePlanet = null;
        let currentSlide = 0;
        const initialCamPos = new THREE.Vector3(0, 30, 90); // Posición inicial más cercana

        function init() {
            try {
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x030311); // Azul muy oscuro

                camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
                camera.position.copy(initialCamPos);

                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // limitar para rendimiento
                renderer.toneMapping = THREE.ACESFilmicToneMapping;
                renderer.toneMappingExposure = 1.2;
                document.getElementById('webgl-container').appendChild(renderer.domElement);

                // Controles más suaves y con límites
                controls = new OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.07;
                controls.rotateSpeed = 0.5;
                controls.zoomSpeed = 1.2;
                controls.panSpeed = 0.5;
                controls.maxDistance = 300;
                controls.minDistance = 20;
                controls.autoRotate = false;
                controls.enablePan = true;
                controls.maxPolarAngle = Math.PI / 2; // Evitar ir bajo el plano

                // Iluminación equilibrada (bajamos el brillo)
                const ambient = new THREE.AmbientLight(0x404060); // Luz ambiental tenue
                scene.add(ambient);

                // Luz principal del sol (más suave que antes)
                const sunLight = new THREE.PointLight(0xffeedd, 2.5, 300);
                sunLight.position.set(0, 0, 0);
                scene.add(sunLight);

                // Luz secundaria para rellenar
                const fillLight = new THREE.DirectionalLight(0x556688, 1);
                fillLight.position.set(1, 1, 1);
                scene.add(fillLight);

                // Nebulosa de fondo (partículas con textura)
                createStarfield();

                // Raycaster
                raycaster = new THREE.Raycaster();
                mouse = new THREE.Vector2();

                // Construir planetas
                buildPlanets();

                // Eventos
                window.addEventListener('resize', onResize);
                window.addEventListener('click', onClick);
                document.getElementById('start-btn').onclick = start;
                document.getElementById('close-btn').onclick = close;
                document.getElementById('prev-btn').onclick = () => moveSlide(-1);
                document.getElementById('next-btn').onclick = () => moveSlide(1);

                animate();
            } catch (e) {
                console.error("Error al inicializar Three.js:", e);
                document.getElementById('error-message').style.display = 'block';
                document.getElementById('start-screen').style.display = 'none';
            }
        }

        // Crear fondo de estrellas con sprites brillantes
        function createStarfield() {
            // Estrellas lejanas como puntos (para rendimiento)
            const starsGeo = new THREE.BufferGeometry();
            const count = 3000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const r = 400 + Math.random() * 200; // radio
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i*3+2] = r * Math.cos(phi);
                
                const intensity = 0.6 + Math.random() * 0.4;
                colors[i*3] = intensity;
                colors[i*3+1] = intensity * (0.8 + 0.2*Math.random());
                colors[i*3+2] = intensity * (0.9 + 0.3*Math.random());
            }
            starsGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            starsGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const starMat = new THREE.PointsMaterial({ 
                size: 1.2, 
                vertexColors: true, 
                transparent: true, 
                opacity: 0.9,
                blending: THREE.AdditiveBlending
            });
            const stars = new THREE.Points(starsGeo, starMat);
            scene.add(stars);
        }

        // Crear planetas con texturas (aunque usemos texturas de placeholder, se ven mejor que colores planos)
        function buildPlanets() {
            const loader = new THREE.TextureLoader();

            solarSystem.forEach(data => {
                const group = new THREE.Group();
                
                // Material con textura si es posible
                const texture = loader.load(data.texture); // Carga la misma textura para todos (por simplicidad, pero idealmente cada planeta tiene la suya)
                const material = new THREE.MeshStandardMaterial({
                    map: texture,
                    color: data.color,
                    emissive: data.emissive || 0x000000,
                    emissiveIntensity: data.id === 'sun' ? 0.8 : 0.1, // Reducido el brillo
                    roughness: 0.5,
                    metalness: 0.1
                });

                const geo = new THREE.SphereGeometry(data.radius, 64, 64);
                const mesh = new THREE.Mesh(geo, material);
                group.add(mesh);

                // Anillos para Saturno
                if (data.hasRings) {
                    const ringGeo = new THREE.RingGeometry(data.radius * 1.2, data.radius * 2.0, 128);
                    const ringMat = new THREE.MeshStandardMaterial({
                        color: 0xc0b0a0,
                        side: THREE.DoubleSide,
                        transparent: true,
                        opacity: 0.4,
                        emissive: 0x332211
                    });
                    const ring = new THREE.Mesh(ringGeo, ringMat);
                    ring.rotation.x = Math.PI / 2.2;
                    ring.rotation.z = 0.3;
                    group.add(ring);
                }

                // Posición inicial aleatoria en la órbita
                const angle = Math.random() * Math.PI * 2;
                group.position.set(Math.cos(angle) * data.distance, 0, Math.sin(angle) * data.distance);
                
                group.userData = { ...data, angle };
                scene.add(group);
                planets.push(group);
                interactables.push(mesh); // solo la esfera es cliqueable
            });

            // Añadir órbitas visuales (líneas)
            planets.forEach(p => {
                if (p.userData.distance > 0) {
                    const points = [];
                    const segments = 128;
                    for (let i = 0; i <= segments; i++) {
                        const angle = (i / segments) * Math.PI * 2;
                        points.push(new THREE.Vector3(Math.cos(angle) * p.userData.distance, 0, Math.sin(angle) * p.userData.distance));
                    }
                    const geometry = new THREE.BufferGeometry().setFromPoints(points);
                    const material = new THREE.LineBasicMaterial({ color: 0x557788, transparent: true, opacity: 0.15 });
                    const orbitLine = new THREE.LineLoop(geometry, material);
                    scene.add(orbitLine);
                }
            });
        }

        // Eventos
        function onClick(e) {
            if (isTransitioning || activePlanet) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(interactables);
            if (hits.length > 0) {
                const planetGroup = hits[0].object.parent;
                selectPlanet(planetGroup);
            }
        }

        function selectPlanet(planet) {
            activePlanet = planet;
            currentSlide = 0;
            isTransitioning = true;
            
            const data = planet.userData;
            const offset = data.radius * 4;
            window.targetCam = planet.position.clone().add(new THREE.Vector3(offset, offset/3, offset));
            window.targetLook = planet.position.clone();
            
            updateModal();
            document.getElementById('content-modal').classList.add('active');
            
            // Pausar auto-rotate si estuviera activo
            controls.autoRotate = false;
        }

        function close() {
            activePlanet = null;
            isTransitioning = true;
            window.targetCam = initialCamPos.clone();
            window.targetLook = new THREE.Vector3(0, 0, 0);
            document.getElementById('content-modal').classList.remove('active');
        }

        function updateModal() {
            const data = activePlanet.userData;
            const slide = data.slides[currentSlide];
            document.getElementById('modal-title').innerText = data.name;
            document.getElementById('modal-text').innerText = slide.text;
            
            const img = document.getElementById('carousel-image');
            img.style.opacity = 0;
            setTimeout(() => {
                img.src = slide.image;
                img.style.opacity = 1;
            }, 300);

            // Mostrar u ocultar botones según cantidad de slides
            document.getElementById('prev-btn').style.display = data.slides.length > 1 ? 'block' : 'none';
            document.getElementById('next-btn').style.display = data.slides.length > 1 ? 'block' : 'none';
        }

        function moveSlide(dir) {
            const slides = activePlanet.userData.slides;
            currentSlide = (currentSlide + dir + slides.length) % slides.length;
            updateModal();
        }

        function start() {
            document.getElementById('start-screen').style.opacity = 0;
            setTimeout(() => document.getElementById('start-screen').remove(), 1500);
            const audio = document.getElementById('bg-audio');
            audio.volume = 0.3;
            audio.play().catch(() => {});
        }

        // Animación principal
        function animate() {
            requestAnimationFrame(animate);
            
            if (!activePlanet) {
                // Rotación de planetas alrededor del sol
                planets.forEach(p => {
                    if (p.userData.distance > 0) {
                        p.userData.angle += p.userData.speed * 0.5; // velocidad ajustada
                        p.position.x = Math.cos(p.userData.angle) * p.userData.distance;
                        p.position.z = Math.sin(p.userData.angle) * p.userData.distance;
                    }
                    // Rotación sobre sí mismo
                    p.rotation.y += 0.002;
                });
            }

            // Transición suave de cámara
            if (isTransitioning && window.targetCam) {
                camera.position.lerp(window.targetCam, 0.05);
                controls.target.lerp(window.targetLook, 0.05);
                if (camera.position.distanceTo(window.targetCam) < 0.5) isTransitioning = false;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Iniciar
        init();
    </script>
</body>
</html>
